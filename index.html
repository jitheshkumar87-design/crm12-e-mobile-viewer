<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM 1&2-Electrical Viewer</title>
<style>
:root{
  color-scheme: dark;
  --bg:#212121;
  --panel:#2F2F2F;
  --ink:#ECECEC;
  --muted:#AAAAAA;
  --line:#444444;

  --green:#10A37F;
  --blue:#3B82F6;
  --orange:#F59E0B;
  --red:#EF4444;

  --shadow:0 10px 25px rgba(0,0,0,0.40);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--ink);
}
header{
  position:sticky;
  top:0;
  z-index:5;
  background:#2F2F2F;
  border-bottom:1px solid var(--line);
  padding:12px 14px;
}


.header-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title-block{
    display:flex;
    align-items:center;
    gap:12px;
}
@media (max-width:600px){

    .sail-logo{
        width:40px;
        height:40px;
    }

    h1{
        font-size:16px;
    }

}
.refresh-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:#10A37F;
  color:white;
  font-size:20px;
  cursor:pointer;
}

.refresh-btn:hover{
  opacity:.9;
}

.refresh-btn:active{
  transform:scale(.95);
}
h1{
  margin:0;
  font-size:18px;
  line-height:1.25;
}
.status{
  margin-top:4px;
  color:var(--muted);
  font-size:12px;
}
main{
  max-width:880px;
  margin:0 auto;
  padding:12px;
}
.toolbar{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:12px;
}
.action-btn{
  background:#2F2F2F;
  color:#ECECEC;
  border:1px solid #444;
  min-height:40px;
  padding:9px 12px;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
}
.file-btn input{display:none}
.action-btn.primary,.tab-btn.active{
    background:#10A37F;
  border-color:#10A37F;
  color:white;
}
.search{
  width:100%;
  color:white;
 border:1px solid #555;
  background:#404040;
  min-height:42px;
  padding:9px 11px;
  border-radius:8px;
  font-size:15px;
}
.kpis{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
  margin:12px 0;
}
.kpi{
  background:linear-gradient(135deg,#2F2F2F,#3A3A3A);
  border:1px solid #444;
  border:1px solid var(--line);
  border-radius:8px;
  padding:12px;
  box-shadow:var(--shadow);
  min-height:82px;
  cursor:pointer;
    transition:all .25s ease;
}
.kpi .label{
  color:var(--muted);
  font-size:12px;
  line-height:1.3;
}

.kpi:hover{
    transform:translateY(-4px);
    border-color:#10A37F;
}

.kpi:active{
    transform:scale(.98);
}

.kpi .value{
  font-size:28px;
  font-weight:700;
  margin-top:8px;
}
.green{color:var(--green)}
.blue{color:var(--blue)}
.orange{color:var(--orange)}
.red{color:var(--red)}

.section{
  display:none;
}
.section.active{
  display:block;
}
.list{
  display:grid;
  gap:8px;
}
.row{
  width:100%;
  text-align:left;
  background:linear-gradient(135deg,#2F2F2F,#3A3A3A);
  border:1px solid #444;
  color:#ECECEC;
  border-radius:8px;
  padding:10px;
  cursor:pointer;
  box-shadow:var(--shadow);
}
.row:hover{
  border-color:#10A37F;
}
.row-title{
  font-weight:700;
  font-size:14px;
  overflow-wrap:anywhere;
}
.row-meta{
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
  overflow-wrap:anywhere;
}
.empty{
  background:#2F2F2F;
  border:1px dashed var(--line);
  border-radius:8px;
  padding:18px;
  color:var(--muted);
  text-align:center;
}
.profile{
  display:none;
  position:fixed;
  inset:0;
  z-index:10;
  background:#2F2F2F;
  overflow:auto;
}
.profile.open{
  display:block;
}
.profile-head{
  position:sticky;
  top:0;
 background:#2F2F2F;
  border-bottom:1px solid #444;
  padding:12px;
  display:flex;
  gap:10px;
  align-items:center;
}
.profile-head h2{
  margin:0;
  flex:1;
  font-size:17px;
  overflow-wrap:anywhere;
}
.profile-body{
  max-width:880px;
  margin:0 auto;
  padding:12px;
}
.detail{
  background:#2F2F2F;
  border:1px solid var(--line);
  border-radius:8px;
  margin-bottom:12px;
  overflow:hidden;
}
.detail-row{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:8px;
  padding:10px;
  border-top:1px solid var(--line);
  font-size:14px;
}
.detail-row:first-child{border-top:0}
.detail-row span:first-child{
  color:var(--muted);
}
h3{
  margin:16px 0 8px;
  font-size:15px;
}
.history{
  background:#2F2F2F;
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
}
.history-item{
  padding:10px;
  border-top:1px solid var(--line);
  font-size:14px;
}
.history-item:first-child{border-top:0}
@media (min-width:700px){
  h1{font-size:22px}
  .kpis{grid-template-columns:repeat(5,minmax(0,1fr))}
  .search{max-width:320px}
  .toolbar{justify-content:space-between}
}
</style>
</head>
<body>
<header>
  <div class="header-row">

    <div class="title-block">

    <img src="sail-logo.png"
         alt="SAIL Logo"
         class="sail-logo">

    <div>
        <h1>CRM 1&2-Electrical Manpower Mobile Viewer</h1>

        <div class="status" id="status">
            No mobile data loaded
        </div>
    </div>

</div>

    <button class="refresh-btn"
           onclick="refreshCloudWithAnimation()"
            title="Refresh">

      🔄

    </button>

  </div>
</header>

<main>
  <div class="toolbar">
   
        <input class="search"
       id="searchInput"
       type="search"
       placeholder="Search staff no or name"
       oninput="handleSearch()">
  </div>

  <section class="kpis" id="kpis"></section>


  <section class="section" id="active"></section>
  <section class="section" id="retiring"></section>
  <section class="section" id="due"></section>
  <section class="section" id="overdue"></section>
  <section class="section" id="nomedical"></section>
</main>

<aside class="profile" id="profile">
  <div class="profile-head">
    <button class="action-btn" id="closeProfile" type="button">Back</button>
    <h2 id="profileTitle">Employee</h2>
  </div>
  <div class="profile-body" id="profileBody"></div>
</aside>

<script>
const STORAGE_KEY = "crmMobileSnapshot";
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBvn_8x5Vm0hoVEaUbWVcAtCYbz_GJVnDE",
  authDomain: "crm12-e-manpower-portal.firebaseapp.com",
  projectId: "crm12-e-manpower-portal",
  storageBucket: "crm12-e-manpower-portal.firebasestorage.app",
  messagingSenderId: "600384863365",
  appId: "1:600384863365:web:31fad9a5f70eb04a47bdec"
};
const FIREBASE_COLLECTION = "crmMobile";
const FIREBASE_DOCUMENT = "latestSnapshot";
const FIREBASE_SDK_VERSION = "11.10.0";
let snapshot = null;
let activeTab = "active";
let firebaseDbPromise = null;

function safe(value){
  return String(value ?? "").replace(/[&<>'"]/g,ch=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "'":"&#39;",
    '"':"&quot;"
  }[ch]));
}

function parseDate(value){
  if(!value) return null;
  let s = String(value).trim();
  let iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(iso) return new Date(Number(iso[1]),Number(iso[2])-1,Number(iso[3]));
  let local = s.match(/^(\d{1,2})[./-](\d{1,2})[./-](\d{2,4})$/);
  if(local){
    let y = Number(local[3]);
    if(y < 100) y += 2000;
    return new Date(y,Number(local[2])-1,Number(local[1]));
  }
  let d = new Date(s);
  return isNaN(d) ? null : d;
}

function fmt(value){
  let d = parseDate(value);
  if(!d) return "";
  return String(d.getDate()).padStart(2,"0")+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getFullYear();
}

function getEmployee(staff){
  return (snapshot?.employees || []).find(e => e.staff === staff);
}

function latestMedical(staff){
  let listed = (snapshot?.latestMedicals || []).find(m => m.staff === staff);
  if(listed) return listed;
  return (snapshot?.medicals || [])
    .filter(m => m.staff === staff)
    .sort((a,b)=>(parseDate(b.date) || 0) - (parseDate(a.date) || 0))[0];
}

function setSnapshot(data){
  if(!data || !Array.isArray(data.employees)){
    alert("Invalid mobile data file");
    return;
  }
  snapshot = data;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
}

function firebaseConfigured(){
  return FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith("PASTE_") &&
    FIREBASE_CONFIG.projectId && !FIREBASE_CONFIG.projectId.startsWith("PASTE_") &&
    FIREBASE_CONFIG.appId && !FIREBASE_CONFIG.appId.startsWith("PASTE_");
}

async function getFirebaseDb(){
  if(!firebaseConfigured()){
    throw new Error("Firebase is not configured. Paste your Firebase web app config into FIREBASE_CONFIG first.");
  }
  if(!firebaseDbPromise){
    firebaseDbPromise = Promise.all([
      import(`https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}/firebase-app.js`),
      import(`https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}/firebase-firestore.js`)
    ]).then(([appModule, firestoreModule]) => {
      let app = appModule.initializeApp(FIREBASE_CONFIG);
      return {
        db: firestoreModule.getFirestore(app),
        getDoc: firestoreModule.getDoc,
        doc: firestoreModule.doc
      };
    });
  }
  return firebaseDbPromise;
}

async function refreshFromCloud(){

  try{

    let firebase = await getFirebaseDb();

    let result = await firebase.getDoc(
      firebase.doc(
        firebase.db,
        FIREBASE_COLLECTION,
        FIREBASE_DOCUMENT
      )
    );

    if(!result.exists()){
      alert("No mobile data has been published yet");
      return;
    }

    let data = result.data();

    setSnapshot(data.snapshot);

  }catch(err){

    alert(err.message || "Unable to refresh from Firebase");

  }

}
  

function loadStored(){
  try{
    let raw = localStorage.getItem(STORAGE_KEY);
    if(raw) snapshot = JSON.parse(raw);
  }catch(err){
    snapshot = null;
  }
}

function render(){
  renderStatus();
  renderKpis();
  renderLists();
}

function renderStatus(){
  let status = document.getElementById("status");
  if(!snapshot){
    status.textContent = "No mobile data loaded";
    return;
  }
  status.textContent = "Last updated: " + (snapshot.generatedAtDisplay || snapshot.generatedAt || "Unknown");
}

function renderKpis(){

  let dash = snapshot?.dashboard || {};

  let items = [
    ["Active", dash.activeEmployees || 0, "green", "active"],
    ["Retiring", dash.retiringInSixMonths || 0, "orange", "retiring"],
    ["Due 30 Days", dash.medicalDueIn30Days || 0, "blue", "due"],
    ["Overdue", dash.overdueMedicals || 0, "red", "overdue"],
    ["No Medical", dash.noMedicalRecords || 0, "orange", "nomedical"]
  ];

  document.getElementById("kpis").innerHTML =
  items.map(item => `

    <div class="kpi"
         onclick="showSection('${item[3]}')">

      <div class="label">${item[0]}</div>

      <div class="value ${item[2]}">
        ${item[1]}
      </div>

    </div>

  `).join("");
}
function showSection(tab){

    activeTab = tab;

    document
      .querySelectorAll(".section")
      .forEach(section => {

          section.classList.toggle(
              "active",
              section.id === tab
          );

      });

}

function staffListFor(tab){
  const lists = snapshot?.lists || {};

  switch(tab){
    case "active":
      return lists.activeEmployees || [];

    case "retiring":
      return lists.retiringInSixMonths || [];

    case "due":
      return lists.medicalDueIn30Days || [];

    case "overdue":
      return lists.overdueMedicals || [];

    case "nomedical":
      return lists.noMedicalRecords || [];

    default:
      return [];
  }
}
function filteredStaff(staffList){
  let q = document.getElementById("searchInput").value.trim().toLowerCase();
  if(!q) return staffList;
  return staffList.filter(staff => {
    let e = getEmployee(staff);
    return String(staff).toLowerCase().includes(q) ||
      String(e?.name || "").toLowerCase().includes(q);
  });
}

function renderLists(){
  ["active","retiring","due","overdue","nomedical"].forEach(tab => {
    let root = document.getElementById(tab);
    let staff = filteredStaff(staffListFor(tab));
    root.innerHTML = renderRows(staff);
  });
}

function renderRows(staffList){
  if(!snapshot) return `<div class="empty">Loading data from Cloud</div>`;
  if(!staffList.length) return `<div class="empty">No records found</div>`;
  return `<div class="list">` + staffList.map(staff => {
    let e = getEmployee(staff);
    let med = latestMedical(staff);
    let meta = [];
    if(e?.designation) meta.push(e.designation);
    if(e?.retirement) meta.push("Retires: " + fmt(e.retirement));
    if(med?.due) meta.push("Medical due: " + fmt(med.due));
    return `
      <button class="row" type="button" onclick="openProfile('${safeAttr(staff)}')">
        <div class="row-title">${safe(staff)} - ${safe(e?.name || "Unknown employee")}</div>
        <div class="row-meta">${safe(meta.join(" | "))}</div>
      </button>
    `;
  }).join("") + `</div>`;
}

function safeAttr(value){
  return encodeURIComponent(String(value ?? ""));
}

function openProfile(staffValue){
  let staff = decodeURIComponent(staffValue);
  let e = getEmployee(staff);
  if(!e) return;
  let tr = (snapshot?.trainings || []).filter(t => t.staff === staff);
  let md = (snapshot?.medicals || []).filter(m => m.staff === staff)
    .sort((a,b)=>(parseDate(b.date) || 0) - (parseDate(a.date) || 0));
  let med = latestMedical(staff);

  document.getElementById("profileTitle").textContent = e.name || e.staff;
  document.getElementById("profileBody").innerHTML = `
    <div class="detail">
      ${detail("Staff No", e.staff)}
      ${detail("Name", e.name)}
      ${detail("Designation", e.designation)}
      ${detail("Retirement", fmt(e.retirement))}
      ${detail("Latest Medical", med ? fmt(med.date) : "")}
      ${detail("Medical Due", med ? fmt(med.due) : "")}
    </div>
    <h3>Training History</h3>
    <div class="history">${


history(tr.map(t =>

`${safe(t.name)}

<br>

<span class="row-meta">
${safe(t.duration || '')} ${safe(t.unit || '')}
</span>

<br>

<span class="row-meta">
${fmt(t.date)}
</span>`

))}</div>
    <h3>Medical History</h3>
    <div class="history">${history(md.map(m => `Medical: ${fmt(m.date)}<br><span class="row-meta">Due: ${fmt(m.due)}</span>`))}</div>
  `;
  document.getElementById("profile").classList.add("open");
document.getElementById("searchInput").value = "";
}

function detail(label,value){
  return `<div class="detail-row"><span>${safe(label)}</span><span>${safe(value || "-")}</span></div>`;
}

function history(items){
  if(!items.length) return `<div class="history-item row-meta">No records</div>`;
  return items.map(item => `<div class="history-item">${item}</div>`).join("");
}


async function refreshCloudWithAnimation(){

    const btn = document.querySelector(".refresh-btn");

    btn.style.transform = "rotate(360deg)";
    btn.style.transition = "0.5s";

    await refreshFromCloud();

    setTimeout(()=>{
        btn.style.transform = "";
    },500);

}

const searchBox =
document.getElementById("searchInput");

function handleSearch(){

    if(!snapshot || !snapshot.employees){
        return;
    }

    let q = searchBox.value.trim();

    if(!q) return;

    let emp =
    snapshot.employees.find(
        e => String(e.staff).trim() === q
    );

    if(emp){

        openProfile(
            encodeURIComponent(emp.staff)
        );

    }

}

searchBox.addEventListener(
    "input",
    handleSearch
);

searchBox.addEventListener(
    "keyup",
    handleSearch
);

searchBox.addEventListener(
    "search",
    handleSearch
);

document.getElementById("closeProfile").addEventListener("click", () => {
  document.getElementById("profile").classList.remove("open");
});

loadStored();
render();

refreshFromCloud();

</script>
</body>
</html>
